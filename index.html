<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ff5722">
    <title>SnacXi - Master Version</title>
    <style>
        :root { --brand-color: #ff5722; --bg-color: #f4f6f8; --text-gray: #666; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg-color); color: #333; }
        
        header { 
            background: white; padding: 10px 15px; display: flex; flex-direction: column; gap: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 10;
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 900; color: var(--brand-color); letter-spacing: -1px; }
        .header-btns { display: flex; gap: 8px; }
        .icon-btn { background: #f1f1f1; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .cart-trigger { background: #1a1a1a; color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; }

        .search-box input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; background: #f8f8f8; font-size: 16px; box-sizing: border-box; outline: none; }

        .categories-row { display: flex; gap: 10px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .categories-row::-webkit-scrollbar { display: none; }
        .cat-btn { padding: 8px 18px; border-radius: 20px; border: 1px solid #eee; background: white; white-space: nowrap; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text-gray); }
        .cat-btn.active { background: var(--brand-color); color: white; border-color: var(--brand-color); }

        .container { max-width: 1200px; margin: 15px auto; padding: 0 10px; }
        #product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .card { background: white; padding: 12px; border-radius: 12px; text-align: center; border: 1px solid #eee; position: relative; overflow: hidden; }
        
        .prod-img { width: 100%; height: 90px; object-fit: contain; margin-bottom: 8px; }
        .out-of-stock { filter: grayscale(1); opacity: 0.6; }
        .stock-label { position: absolute; top: 5px; right: 5px; background: #eee; color: #666; font-size: 9px; padding: 2px 5px; border-radius: 4px; font-weight: bold; z-index: 2; }

        .qty-controls { display: flex; justify-content: space-between; align-items: center; background: var(--brand-color); color: white; border-radius: 6px; height: 32px; }
        .qty-btn { background: none; border: none; color: white; padding: 0 12px; cursor: pointer; font-size: 18px; font-weight: bold; }

        .sidebar { position: fixed; top: 0; right: -350px; width: 320px; height: 100%; background: white; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; }
        .sidebar.open { right: 0; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 90; }

        .bill-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; color: #555; }
        .bill-total { border-top: 1px solid #eee; padding-top: 10px; margin-top: 10px; font-weight: bold; font-size: 18px; color: #000; }
        .checkout-btn { width: 100%; background: #0c831f; color: white; border: none; padding: 15px; border-radius: 12px; margin-top: 15px; font-weight: bold; font-size: 16px; cursor: pointer; }
        
        /* New Location Button Style */
        .loc-btn { width: 100%; background: #f0f0f0; border: 1px dashed #bbb; padding: 8px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; font-size: 12px; color: #444; font-weight: 600; }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <div class="logo">SnacXi</div>
        <div class="header-btns">
            <button class="icon-btn" onclick="openSidebar('profile-sidebar')">👤 Profile</button>
            <div class="cart-trigger" onclick="openSidebar('cart-sidebar')">🛒 <span id="cart-count">0</span></div>
        </div>
    </div>
    <div class="search-box">
        <input type="text" id="search" placeholder="Search for groceries..." oninput="updateUI()">
    </div>
    <div class="categories-row">
        <button class="cat-btn active" onclick="setCategory('All', this)">All</button>
        <button class="cat-btn" onclick="setCategory('Dairy', this)">Dairy</button>
        <button class="cat-btn" onclick="setCategory('Snacks', this)">Snacks</button>
        <button class="cat-btn" onclick="setCategory('Drinks', this)">Drinks</button>
    </div>
</header>

<div id="overlay" onclick="closeSidebars()"></div>

<!-- Profile -->
<div id="profile-sidebar" class="sidebar">
    <h3>My Profile</h3>
    <input type="text" id="uname" placeholder="Full Name" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
    <button class="loc-btn" onclick="getLocation()">📍 Get My Current Location</button>
    <textarea id="uaddr" placeholder="Full Delivery Address" style="width:100%; padding:10px; height:80px; border:1px solid #ddd; border-radius:8px;"></textarea>
    <button onclick="saveUser()" style="width:100%; background:var(--brand-color); color:white; border:none; padding:12px; border-radius:8px; margin-top:10px; font-weight:bold;">Save Changes</button>
    <div id="user-display" style="margin-top:20px; font-size:11px; color:#666; word-break: break-all;"></div>
</div>

<!-- Cart -->
<div id="cart-sidebar" class="sidebar">
    <h3>Bill Summary</h3>
    <div id="cart-list" style="flex-grow:1; overflow-y:auto; border-bottom:1px solid #eee; margin-bottom:15px; padding-top:10px;"></div>
    
    <div class="bill-details">
        <div class="bill-row"><span>Item Total</span><span id="sub-total">₹0</span></div>
        <div class="bill-row"><span>Delivery Fee</span><span id="del-fee">₹0</span></div>
        <div class="bill-row"><span>Handling Charge</span><span id="hand-fee">₹0</span></div>
        <div class="bill-row"><span>GST (5%)</span><span id="gst-amt">₹0</span></div>
        <div class="bill-row bill-total"><span>Grand Total</span><span id="grand-total">₹0</span></div>
    </div>

    <button class="checkout-btn" onclick="checkout()">Order on WhatsApp</button>
</div>

<div class="container">
    <div id="product-grid"></div>
</div>

<script>
    const products = [
        { id: 1, name: "Fresh Milk", cat: "Dairy", price: 32, img: "https://images.unsplash.com/photo-1563636619-e910ef44755d?w=200", status: "in" },
        { id: 2, name: "Potato Chips", cat: "Snacks", price: 20, img: "https://images.unsplash.com/photo-1566478989037-eec170784d0b?w=200", status: "in" },
        { id: 3, name: "Fresh Eggs", cat: "Dairy", price: 55, img: "https://images.unsplash.com/photo-1587486914762-8f98275f5d42?w=200", status: "out" },
        { id: 4, name: "Coke", cat: "Drinks", price: 40, img: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=200", status: "in" },
        { id: 5, name: "Instant Noodles", cat: "Snacks", price: 14, img: "https://images.unsplash.com/photo-1569718212165-3a8278d5f624?w=200", status: "in" },
        { id: 6, name: "Apple Juice", cat: "Drinks", price: 90, img: "https://images.unsplash.com/photo-1600271886391-d22f18349201?w=200", status: "in" }
    ];

    let cart = JSON.parse(localStorage.getItem('snacxi_cart')) || {};
    let userData = JSON.parse(localStorage.getItem('snacxi_user')) || { name: "", addr: "" };
    let activeCat = "All";

    function updateUI() {
        const grid = document.getElementById('product-grid');
        const query = document.getElementById('search').value.toLowerCase();
        grid.innerHTML = "";

        products.forEach(p => {
            if (activeCat !== "All" && p.cat !== activeCat) return;
            if (!p.name.toLowerCase().includes(query)) return;

            const qty = cart[p.id] || 0;
            const isInStock = p.status === "in";
            
            const card = document.createElement('div');
            card.className = `card ${!isInStock ? 'out-of-stock' : ''}`;
            card.innerHTML = `
                ${!isInStock ? '<span class="stock-label">OUT OF STOCK</span>' : ''}
                <img src="${p.img}" class="prod-img">
                <div style="font-weight:bold; font-size:14px;">${p.name}</div>
                <div style="margin:5px 0; font-weight:bold; color:#333;">₹${p.price}</div>
                <div style="height:32px;">
                    ${!isInStock ? 
                        `<button disabled style="width:100%; height:100%; background:#ccc; color:white; border:none; border-radius:6px; font-weight:bold;">SOLD OUT</button>` :
                        (qty === 0 ? 
                            `<button style="width:100%; height:100%; border:1px solid var(--brand-color); background:white; color:var(--brand-color); border-radius:6px; font-weight:bold; cursor:pointer;" onclick="changeQty(${p.id}, 1)">ADD</button>` :
                            `<div class="qty-controls"><button class="qty-btn" onclick="changeQty(${p.id}, -1)">−</button><span>${qty}</span><button class="qty-btn" onclick="changeQty(${p.id}, 1)">+</button></div>`
                        )
                    }
                </div>`;
            grid.appendChild(card);
        });
        updateTotals();
        localStorage.setItem('snacxi_cart', JSON.stringify(cart));
    }

    function setCategory(cat, btn) {
        activeCat = cat;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateUI();
    }

    function changeQty(id, delta) {
        cart[id] = (cart[id] || 0) + delta;
        if (cart[id] <= 0) delete cart[id];
        updateUI();
    }

    function updateTotals() {
        let count = 0, itemTotal = 0;
        const list = document.getElementById('cart-list');
        list.innerHTML = "";

        for (let id in cart) {
            const p = products.find(prod => prod.id == id);
            if(!p) continue;
            count += cart[id];
            itemTotal += (p.price * cart[id]);
            list.innerHTML += `<div class="bill-row"><span>${p.name} x ${cart[id]}</span><span>₹${p.price * cart[id]}</span></div>`;
        }

        const gst = Math.round(itemTotal * 0.05);
        const delFee = itemTotal > 0 ? 25 : 0;
        const handFee = itemTotal > 0 ? 5 : 0;
        const grandTotal = itemTotal > 0 ? (itemTotal + delFee + handFee + gst) : 0;

        document.getElementById('cart-count').innerText = count;
        document.getElementById('sub-total').innerText = "₹" + itemTotal;
        document.getElementById('del-fee').innerText = "₹" + delFee;
        document.getElementById('hand-fee').innerText = "₹" + handFee;
        document.getElementById('gst-amt').innerText = "₹" + gst;
        document.getElementById('grand-total').innerText = "₹" + grandTotal;
        
        if(userData.name) {
            document.getElementById('user-display').innerHTML = `<b>Saved Profile:</b><br>${userData.name}<br>${userData.addr}`;
        }
    }

    function getLocation() {
        if (navigator.geolocation) {
            alert("Fetching your location... Please click 'Allow'");
            navigator.geolocation.getCurrentPosition((pos) => {
                const link = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                document.getElementById('uaddr').value = `Live Location: ${link}`;
                alert("Location Linked! You can add your floor/house number now.");
            }, () => {
                alert("Location access denied. Please type address manually.");
            });
        } else {
            alert("Location not supported on this browser.");
        }
    }

    function openSidebar(id) { 
        document.getElementById(id).classList.add('open'); 
        document.getElementById('overlay').style.display = 'block'; 
        if(id === 'profile-sidebar') {
            document.getElementById('uname').value = userData.name;
            document.getElementById('uaddr').value = userData.addr;
        }
    }
    
    function closeSidebars() { 
        document.querySelectorAll('.sidebar').forEach(s => s.classList.remove('open')); 
        document.getElementById('overlay').style.display = 'none'; 
    }
    
    function saveUser() {
        userData.name = document.getElementById('uname').value;
        userData.addr = document.getElementById('uaddr').value;
        if(!userData.name || !userData.addr) { alert("Please fill details!"); return; }
        localStorage.setItem('snacxi_user', JSON.stringify(userData));
        updateTotals();
        closeSidebars();
    }

    function checkout() {
        if (!userData.addr) { alert("Add address in Profile!"); openSidebar('profile-sidebar'); }
        else if (Object.keys(cart).length === 0) { alert("Add items to cart!"); }
        else { 
            const myNumber = "7014543768"; // <-- REPLACE WITH YOUR REAL NUMBER
            let message = `*SnacXi Order*%0A*Name:* ${userData.name}%0A*Address:* ${userData.addr}%0A%0A*Items:*%0A`;
            for (let id in cart) {
                const p = products.find(prod => prod.id == id);
                message += `- ${p.name} x ${cart[id]}%0A`;
            }
            message += `%0A*Total Bill: ${document.getElementById('grand-total').innerText}*`;
            window.open(`https://wa.me/${myNumber}?text=${message}`, '_blank');
        }
    }

    updateUI();
</script>
</body>
</html>
